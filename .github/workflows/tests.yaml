name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests (${{ matrix.os }} / Python ${{ matrix.python-version }})
    needs: []
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.os }}-${{ matrix.python-version }}-${{ hashFiles('requirements*.txt') }}

      - uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ hashFiles('src/**/*.py') }}

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install chromadb sentence-transformers pytest coverage

      - name: Lancer les tests
        run: python -m pytest tests/ -v --tb=short

      - name: Rapport de couverture
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: |
          coverage run -m pytest tests/
          coverage report -m --fail-under=70
          coverage html

      - name: Upload rapport couverture
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
