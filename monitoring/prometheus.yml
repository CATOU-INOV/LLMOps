global:
  scrape_interval: 10s
  evaluation_interval: 10s

rule_files:
  - alertes.yml

scrape_configs:
  - job_name: "llmops-api"
    static_configs:
      # host.docker.internal pointe vers localhost de la machine hôte (Mac/Windows)
      # Sur Linux : remplacer par l'IP de l'interface docker0 (172.17.0.1)
      - targets: ["host.docker.internal:8000"]
    metrics_path: /metrics
